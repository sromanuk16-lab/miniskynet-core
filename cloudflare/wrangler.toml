name = "miniskynet-core"
main = "src/worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

# KV binding must be added in Cloudflare dashboard:
# Worker Settings -> Bindings -> KV namespace binding
# Variable name: MINISKYNET_KV

[vars]
OPENROUTER_MODEL_CHEAP = "openai/gpt-4o-mini"
OPENROUTER_MODEL_CODING = "openai/gpt-4o-mini"
MAX_DAILY_COST_USD = "0.50"
MAX_CYCLES_PER_DAY = "20"
MAX_OUTPUT_TOKENS = "800"
ALIVE_ENABLED = "false"
ALIVE_OWNER_CHAT_ID = ""

[triggers]
crons = ["*/30 * * * *"]
